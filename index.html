비밀주의, 감정 기복, 현실 도피",body:"신장, 방광, 귀, 뼈, 생식기",career:"학문, 철학, IT, 유통, 여행, 무역, 상담, 심리",color:"검정, 남색",direction:"북쪽"}},v={갑:{title:"큰 나무(甲木) — 우뚝 선 거목",desc:"하늘을 향해 곧게 자라는 큰 나무와 같다. 리더십이 강하고 개척 정신이 남다르다. 타인을 이끌고 새 길을 여는 재주가 있으나, 때로는 고집스러워 주변의 말에 귀를 기울이지 못하기도 한다.",famous:"이순신 장군, 세종대왕처럼 길을 여는 선구자 기질"},을:{title:"작은 풀(乙木) — 바람에 휘어도 꺾이지 않는 풀",desc:"부드럽게 굽히지만 절대 꺾이지 않는 풀과 같다. 섬세하고 감수성이 풍부하며 인간관계가 좋다. 어떤 환경에도 잘 적응하나 때로는 결단이 늦어 기회를 놓치기도 한다.",famous:"유연하면서도 결국 살아남는 생명력의 상징"},병:{title:"태양(丙火) — 천하를 밝히는 뜨거운 태양",desc:"온 세상을 밝히는 태양과 같다. 밝고 활달하며 사교성이 뛰어나다. 어디서든 주인공이 되는 기질이 있으나, 너무 빛나려 하다가 에너지를 소진하기도 한다.",famous:"무대 위의 스타, 강단에 선 연설가의 기질"},정:{title:"촛불(丁火) — 어둠 속을 밝히는 따뜻한 불빛",desc:"작지만 깊은 곳을 밝히는 촛불과 같다. 섬세하고 따뜻하며 예리한 직관을 지닌다. 헌신적이고 창의적이나 예민함으로 인해 감정이 흔들리기 쉽다.",famous:"예술가, 상담사, 치유자의 기질"},무:{title:"큰 산(戊土) — 묵직하게 버티는 대산",desc:"흔들리지 않는 큰 산과 같다. 신뢰감이 넘치고 묵직한 존재감을 지닌다. 포용력이 크고 책임감이 강하나 변화에 느리고 고집이 세다.",famous:"믿음직한 기둥, 조직의 중심이 되는 기질"},기:{title:"평야(己土) — 만물을 품는 너른 들판",desc:"모든 씨앗을 품어 키우는 비옥한 들판과 같다. 현실적이고 세심하며 배려심이 깊다. 조율과 중재에 능하나 남에게 너무 맞추다가 정작 자신을 잃기도 한다.",famous:"뒤에서 모두를 살피는 조력자, 어머니의 기질"},경:{title:"큰 바위(庚金) — 천년을 버티는 단단한 바위",desc:"천년의 시간에도 닳지 않는 바위와 같다. 정의롭고 원칙적이며 강한 의지를 지닌다. 결단이 빠르고 추진력이 있으나 융통성이 부족해 인간관계에서 마찰을 일으키기도 한다.",famous:"정의의 수호자, 원칙주의자의 기질"},신:{title:"보석(辛金) — 갈고닦아 빛나는 보석",desc:"연마할수록 빛나는 보석과 같다. 섬세하고 날카로우며 완벽함을 추구한다. 미적 감각이 뛰어나고 분석력이 좋으나 예민함으로 인해 쉽게 상처받는다.",famous:"장인 정신, 완벽주의 예술가의 기질"},임:{title:"큰 강(壬水) — 도도히 흐르는 대하",desc:"거침없이 흐르는 큰 강과 같다. 지혜롭고 자유로우며 깊은 철학적 사고를 지닌다. 적응력이 탁월하고 지략이 넘치나 변덕스럽고 깊은 내면을 쉽게 드러내지 않는다.",famous:"전략가, 사상가, 자유로운 탐구자의 기질"},계:{title:"이슬비(癸水) — 조용히 스며드는 봄비",desc:"대지를 적시는 이슬비와 같다. 섬세하고 감성적이며 통찰력이 깊다. 남이 보지 못하는 것을 보는 예민한 감각을 지니나 때로는 지나치게 내향적으로 흐른다.",famous:"심리상담사, 철학자, 예민한 예술가의 기질"}},E={목:{style:"처음 보는 순간 설레는 한눈에 반하는 스타일이란다. 열정적으로 다가가지만 때로는 너무 앞서가다 혼자가 되기도 하지.",ideal:"자신의 성장을 응원해주고 함께 꿈을 꿀 수 있는 파트너가 제일 좋단다. 독립적이면서도 서로를 인정하는 관계가 최선이란다.",advice:"너무 이상형을 높이 잡지 말거라. 곁에 있는 사람의 작은 배려도 소중히 여기면 좋은 인연이 오래가는 법이란다."},화:{style:"뜨겁게 타오르는 연애를 즐기는 타입이란다. 감정 표현이 풍부해 상대를 설레게 하는 재주가 있지. 다만 빨리 뜨거워지고 빨리 식기도 한다는 것을 기억하거라.",ideal:"나를 빛나게 해주고 함께 있을 때 더 반짝이게 해주는 사람이 천생연분이란다. 서로 존중하고 영감을 주고받는 관계가 최고란다.",advice:"감정이 식었다고 바로 포기하지 말거라. 열정이 식은 자리에 진정한 사랑이 자라는 법이란다."},토:{style:"천천히 오래 보면서 신중하게 마음을 여는 스타일이란다. 한번 마음을 열면 깊고 변함없는 사랑을 하는 복된 기질이지.",ideal:"안정적이고 믿을 수 있으며 함께 미래를 설계할 수 있는 파트너가 최고란다. 정직하고 성실한 사람과 좋은 연을 맺는다.",advice:"너무 오래 살펴보다가 좋은 인연을 놓치는 수도 있단다. 적당히 용기를 내어보거라."},금:{style:"완벽한 상대를 찾는 기준이 높은 타입이란다. 원칙과 예의를 중시하고 진지한 관계를 원하지. 가볍고 즉흥적인 연애보다는 깊이 있는 관계를 추구한다.",ideal:"지적이고 원칙이 있으며 서로를 이해해주는 파트너가 천생연분이란다. 겉보다는 속이 꽉 찬 사람과 오래 간다.",advice:"기준을 조금 낮추고 상대의 장점을 먼저 보는 연습을 하거라. 완벽한 사람은 없단다."},수:{style:"감각적이고 낭만적인 연애를 꿈꾸는 타입이란다. 깊은 정신적 교감을 중시하고 상대의 내면을 꿰뚫어 보는 통찰력이 있지.",ideal:"지적이고 심오한 대화가 통하며 서로의 내면을 이해해주는 파트너가 최고란다. 감성이 맞는 사람과 오래 간다.",advice:"너무 이상적인 사랑만을 꿈꾸지 말거라. 현실의 작은 행복도 소중히 여기면 좋은 인연을 오래 간직할 수 있단다."}},x={목:{style:"돈보다 성취와 가치를 먼저 추구하는 스타일이란다. 하지만 꿈이 현실이 되면 꽤 큰돈이 따라오는 팔자이기도 하다.",strength:"사업적 직관과 새로운 기회를 잡는 능력이 뛰어나다.",weakness:"돈 관리가 허술해 벌기는 잘 해도 새는 곳이 많을 수 있다.",advice:"고정적인 저축 습관을 들이고, 신뢰할 수 있는 금융 전문가와 상의해서 자산을 관리하거라."},화:{style:"돈을 쓸 때 화끈하게 쓰고 벌 때도 크게 버는 고저가 심한 재물운이란다.",strength:"영업력, 설득력이 뛰어나 재물 기회가 잘 온다.",weakness:"충동 소비와 인간관계에서 비롯된 지출이 많을 수 있다.",advice:"큰 결정 전에 하루 이틀 생각하는 습관을 갖거라. 급하게 결정한 투자는 화를 부른단다."},토:{style:"천천히 쌓아가는 안정적인 재물운이란다. 한꺼번에 큰돈을 벌기보다는 꾸준히 모아가는 스타일이지.",strength:"재산 관리와 현실적인 계획 수립에 탁월하다.",weakness:"너무 보수적이어서 좋은 투자 기회를 놓치기도 한다.",advice:"전통적인 재테크와 함께 소액 분산 투자도 병행하면 더 좋은 결과를 낼 수 있단다."},금:{style:"원칙에 따라 철저하게 관리되는 재물운이란다. 한 번 번 돈은 잘 지키는 스타일이지.",strength:"절약 정신과 장기적 재무 계획 수립 능력이 탁월하다.",weakness:"너무 쥐고만 있으면 돈도 흐르지 못하는 법, 투자와 분배의 균형이 필요하다.",advice:"가끔은 돈을 흘려보내는 것도 복을 부르는 방법이란다. 나눔과 기부도 좋은 재물운의 씨앗이 된다."},수:{style:"물처럼 들어오고 나가는 유동적인 재물운이란다. 기회가 왔을 때 잡으면 크게 벌 수 있다.",strength:"정보 수집과 분석 능력이 뛰어나 재테크에 강하다.",weakness:"감정에 따라 재정 결정을 내리면 손해를 볼 수 있다.",advice:"감정이 흔들릴 때는 큰 재정 결정을 미루거라. 냉정하게 분석한 뒤 행동하는 것이 최선이란다."}},A={목:{focus:"간장과 담낭, 눈, 근육과 신경계를 잘 살펴야 하는 사주란다.",risk:"스트레스성 간 기능 저하, 눈의 피로, 근육 긴장, 신경성 두통에 유의하거라.",care:"규칙적인 산책과 숲 속 걷기, 녹색 채소 섭취, 충분한 수면이
