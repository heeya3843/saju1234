<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대만신(大萬神) 종합 사주 보고서 v4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f8f6f0;color:#222}
#pg-intro{min-height:100vh;background:linear-gradient(155deg,#1a0a3d 0%,#2d1b69 55%,#1a3a5c 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.logo-diamond{width:76px;height:76px;background:linear-gradient(135deg,#f0d080,#c9a84c);transform:rotate(45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(201,168,76,.6);margin-bottom:28px}
.logo-diamond span{transform:rotate(-45deg);font-size:32px}
.intro-title{font-size:36px;color:#f0d080;letter-spacing:8px;margin-bottom:6px}
.intro-sub{font-size:13px;color:rgba(255,255,255,.4);letter-spacing:3px;margin-bottom:34px}
.form-box{background:rgba(255,255,255,.08);border:1px solid rgba(201,168,76,.3);border-radius:16px;padding:28px;width:100%;max-width:520px}
.form-box h2{color:#f0d080;font-size:17px;margin-bottom:16px;text-align:center;letter-spacing:2px}
.cal-toggle{display:flex;gap:0;margin-bottom:14px;border:1px solid rgba(201,168,76,.3);border-radius:8px;overflow:hidden}
.cal-btn{flex:1;padding:10px;text-align:center;cursor:pointer;color:rgba(255,255,255,.5);font-size:14px;background:transparent;border:none;font-family:inherit;transition:all .2s}
.cal-btn.active{background:rgba(201,168,76,.25);color:#f0d080;font-weight:bold}
.fgroup{margin-bottom:13px}
.fgroup label{display:block;color:rgba(255,255,255,.6);font-size:12px;margin-bottom:5px;letter-spacing:.5px}
.finput,.fselect{width:100%;padding:10px 12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-size:14px;outline:none;font-family:inherit;transition:border-color .2s}
.finput:focus,.fselect:focus{border-color:#c9a84c}
.finput::placeholder{color:rgba(255,255,255,.3)}
.fselect option{background:#2d1b69;color:#fff}
.date-row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px}
.leap-row{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.leap-row input[type=checkbox]{width:16px;height:16px;accent-color:#c9a84c}
.leap-row label{color:rgba(255,255,255,.6);font-size:13px;cursor:pointer}
.gender-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0}
.gbtn{padding:10px 8px;border:1px solid rgba(255,255,255,.2);border-radius:8px;background:rgba(255,255,255,.05);color:rgba(255,255,255,.55);cursor:pointer;text-align:center;font-size:14px;transition:all .2s;user-select:none;font-family:inherit}
.gbtn.selected{border-color:#c9a84c;background:rgba(201,168,76,.2);color:#f0d080;font-weight:bold}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#c9a84c,#a07030);border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:bold;cursor:pointer;letter-spacing:2px;font-family:inherit;margin-top:14px;transition:opacity .2s}
.submit-btn:hover{opacity:.88}
#pg-loading{display:none;min-height:100vh;background:linear-gradient(155deg,#1a0a3d,#2d1b69);flex-direction:column;align-items:center;justify-content:center}
.spinner{width:52px;height:52px;border:3px solid rgba(201,168,76,.25);border-top-color:#c9a84c;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:28px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-title{color:#f0d080;font-size:18px;margin-bottom:24px;letter-spacing:3px}
.step-list{list-style:none;width:300px}
.step-item{padding:9px 0;color:rgba(255,255,255,.3);font-size:13px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.05)}
.step-item::before{content:"○";font-size:16px;min-width:20px}
.step-item.done{color:rgba(255,255,255,.85)}
.step-item.done::before{content:"✓";color:#c9a84c}
#pg-report{display:none;max-width:920px;margin:0 auto;padding:20px 16px}
.back-btn{margin-bottom:20px;padding:10px 20px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.4);border-radius:8px;color:#c9a84c;cursor:pointer;font-family:inherit;font-size:14px}
.cover{background:linear-gradient(155deg,#1a0a3d,#2d1b69 55%,#1a3a5c);border-radius:20px;padding:48px 36px;text-align:center;margin-bottom:24px;position:relative;overflow:hidden}
.cover::before{content:"";position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 70% 30%,rgba(201,168,76,.08) 0%,transparent 60%);pointer-events:none}
.cover-brand{color:rgba(201,168,76,.6);font-size:12px;letter-spacing:4px;margin-bottom:24px}
.cover-diamond{width:60px;height:60px;background:linear-gradient(135deg,#f0d080,#c9a84c);transform:rotate(45deg);margin:0 auto 24px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(201,168,76,.4)}
.cover-diamond span{transform:rotate(-45deg);font-size:24px}
.cover-name{font-size:44px;color:#f0d080;letter-spacing:6px;margin-bottom:8px;font-weight:300}
.cover-sub{color:rgba(255,255,255,.4);font-size:13px;letter-spacing:3px;margin-bottom:24px}
.cover-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px}
.ctag{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);border-radius:20px;padding:5px 14px;color:#f0d080;font-size:12px}
.cover-quote{color:rgba(255,255,255,.72);font-size:13.5px;line-height:2.2;max-width:520px;margin:0 auto 20px;font-style:italic}
.cover-date{color:rgba(255,255,255,.25);font-size:11px;letter-spacing:2px}
.section{background:#fff;border-radius:16px;padding:26px 22px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.sec-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid #f0ebe0}
.sec-num{width:42px;height:42px;background:linear-gradient(135deg,#1a0a3d,#2d1b69);color:#f0d080;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;flex-shrink:0}
.sec-title{font-size:18px;font-weight:700;color:#1a0a3d}
.sec-desc{font-size:12px;color:#888;margin-top:3px}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.3),transparent);margin:4px 0 20px}
.ptable{width:100%;border-collapse:collapse;font-size:13px}
.ptable th,.ptable td{border:1px solid #e8e0d0;padding:10px 12px;text-align:center;vertical-align:middle}
.ptable thead th{background:linear-gradient(135deg,#1a0a3d,#2d1b69);color:#f0d080;font-weight:600;font-size:12px;letter-spacing:1px}
.ptable tbody tr:nth-child(even){background:#faf8f4}
.ptable tbody td:first-child{background:#f5f0e8;font-weight:600;font-size:12px;color:#555}
.stem-txt{font-size:30px;font-weight:700;line-height:1.2}
.branch-txt{font-size:26px;font-weight:600;line-height:1.2}
.elem-txt{font-size:11px;color:#888;margin-top:2px}
.star-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.stage-txt{font-size:12px;color:#444}
.el-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.el-name{width:28px;font-size:11px;color:#666;font-weight:600}
.el-emoji{width:24px;font-size:16px}
.el-track{flex:1;height:30px;background:#f0ebe0;border-radius:6px;overflow:hidden}
.el-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;color:#fff;font-size:12px;font-weight:600}
.el-cnt{width:32px;text-align:right;font-size:13px;font-weight:700}
.gauge-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.gauge-lbl{width:60px;font-size:12px;color:#555}
.gauge-track{flex:1;height:18px;background:#f0ebe0;border-radius:10px;overflow:hidden}
.gauge-fill{height:100%;border-radius:10px}
.gauge-pct{width:40px;text-align:right;font-size:13px;font-weight:700;color:#1a0a3d}
.dark-card{background:linear-gradient(135deg,#1a0a3d,#2d1b69);border-radius:12px;padding:20px;color:rgba(255,255,255,.88);margin-top:14px}
.dark-card h3{color:#f0d080;font-size:14px;margin-bottom:10px;letter-spacing:1px}
.dark-card p{font-size:13px;line-height:1.95;margin-bottom:6px}
.dark-card ul{margin-top:8px;padding-left:18px}
.dark-card li{font-size:13px;line-height:1.85;margin-bottom:4px}
.ast-card{background:linear-gradient(135deg,#0a1a3d,#1a2d6b);border-radius:12px;padding:20px;color:rgba(255,255,255,.88);margin-top:14px}
.ast-card h3{color:#7ec8e3;font-size:14px;margin-bottom:10px;letter-spacing:1px}
.ast-card p{font-size:13px;line-height:1.95;margin-bottom:6px}
.ast-card ul{padding-left:18px;margin-top:8px}
.ast-card li{font-size:13px;line-height:1.85;margin-bottom:4px}
.zodiac-big{font-size:60px;display:block;margin-bottom:8px}
.zodiac-name{color:#f0d080;font-size:22px;font-weight:700;margin-bottom:6px}
.zodiac-sub{color:rgba(255,255,255,.5);font-size:12px;margin-bottom:14px}
.timeline{display:flex;flex-direction:column;gap:10px}
.tl-item{display:flex;gap:12px}
.tl-left{display:flex;flex-direction:column;align-items:center;gap:0}
.tl-dot{width:14px;height:14px;border-radius:50%;background:#e0d8cc;flex-shrink:0}
.tl-dot.active{background:#c9a84c;box-shadow:0 0 10px rgba(201,168,76,.5)}
.tl-bar{width:2px;flex:1;background:#e0d8cc;margin:2px auto}
.tl-bar.active{background:#c9a84c}
.tl-body{flex:1;padding:14px 16px;background:#faf8f4;border-radius:12px;border:1px solid #e8e0d0;margin-bottom:0}
.tl-body.active{background:linear-gradient(135deg,#1a0a3d,#2d1b69);color:#fff;border-color:#c9a84c}
.tl-age{font-size:11px;color:#888;margin-bottom:3px}
.tl-body.active .tl-age{color:rgba(255,255,255,.5)}
.tl-ganji{font-size:22px;font-weight:700;color:#1a0a3d;margin-bottom:3px}
.tl-body.active .tl-ganji{color:#f0d080}
.tl-elem{font-size:11px;color:#888}
.tl-body.active .tl-elem{color:rgba(255,255,255,.6)}
.tl-desc{font-size:12px;color:#555;margin-top:6px;line-height:1.7}
.tl-body.active .tl-desc{color:rgba(255,255,255,.75)}
.year-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:8px}
.year-card{background:#faf8f4;border:1px solid #e8e0d0;border-radius:10px;padding:12px;text-align:center}
.year-card.cur{background:linear-gradient(135deg,#1a0a3d,#2d1b69);border-color:#c9a84c}
.yc-year{font-size:11px;color:#888;margin-bottom:4px}
.year-card.cur .yc-year{color:rgba(255,255,255,.5)}
.yc-ganji{font-size:18px;font-weight:700;color:#1a0a3d;margin-bottom:4px}
.year-card.cur .yc-ganji{color:#f0d080}
.yc-star{font-size:11px;color:#666}
.year-card.cur .yc-star{color:rgba(255,255,255,.65)}
.ssal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:10px}
.ssal-card{background:#faf8f4;border:2px solid #e8e0d0;border-radius:10px;padding:14px;text-align:center}
.ssal-card.has{border-color:#c9a84c;background:rgba(201,168,76,.07)}
.ssal-card.has-red{border-color:#e74c3c;background:rgba(231,76,60,.05)}
.ssal-name{font-size:13px;font-weight:700;color:#1a0a3d;margin-bottom:6px}
.ssal-val{font-size:20px;font-weight:700;margin-bottom:4px}
.ssal-where{font-size:11px;color:#888}
.ssal-none{font-size:20px;color:#ccc}
.rel-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.rel-card{background:#faf8f4;border:1px solid #e8e0d0;border-radius:10px;padding:14px}
.rel-card h4{font-size:12px;font-weight:700;color:#1a0a3d;margin-bottom:8px}
.rel-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.rel-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;min-width:36px;text-align:center}
.badge-hap{background:#e8f5e9;color:#2d8a4e}
.badge-chung{background:#fde8e8;color:#c0392b}
.badge-hyung{background:#fef3e8;color:#e67e22}
.badge-pa{background:#e8f0fe;color:#3b5bdb}
.badge-hae{background:#fce8f6;color:#9c27b0}
.badge-sam{background:#e3f2fd;color:#1565c0}
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.month-card{background:#faf8f4;border:1px solid #e8e0d0;border-radius:10px;padding:12px}
.month-card.cur-m{border-color:#c9a84c;background:rgba(201,168,76,.07)}
.mc-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.mc-num{font-size:11px;color:#888}
.mc-ganji{font-size:14px;font-weight:700;color:#1a0a3d}
.mc-score-bar{height:6px;background:#f0ebe0;border-radius:3px;margin-top:6px;overflow:hidden}
.mc-score-fill{height:100%;border-radius:3px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:14px}
.stat-card{background:#faf8f4;border:1px solid #e8e0d0;border-radius:10px;padding:14px;text-align:center}
.stat-label{font-size:11px;color:#888;margin-bottom:6px}
.stat-val{font-size:15px;font-weight:700;color:#1a0a3d;margin-bottom:4px}
.stat-sub{font-size:11px;color:#666}
.info-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.info-table th{background:#f5f0e8;padding:8px 10px;text-align:left;border:1px solid #e0d8cc;font-size:11px;color:#555;width:30%}
.info-table td{padding:8px 10px;border:1px solid #e0d8cc;font-size:13px}
/* PDF 저장 버튼 스타일 */
.report-toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.tbtn{display:flex;align-items:center;gap:7px;padding:10px 18px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;transition:all .2s;border:none}
.tbtn-back{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.4)!important;color:#c9a84c}
.tbtn-pdf{background:linear-gradient(135deg,#c0392b,#96281b);color:#fff;box-shadow:0 2px 8px rgba(192,57,43,.3)}
.tbtn-share{background:linear-gradient(135deg,#2d6a4f,#1b4332);color:#fff;box-shadow:0 2px 8px rgba(45,106,79,.3)}
.tbtn-copy{background:linear-gradient(135deg,#1565c0,#0d47a1);color:#fff;box-shadow:0 2px 8px rgba(21,101,192,.3)}
.tbtn:hover{opacity:.85;transform:translateY(-1px)}
/* 공유 모달 */
#share-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;align-items:center;justify-content:center}
#share-modal.open{display:flex}
.share-box{background:#fff;border-radius:16px;padding:28px;width:340px;max-width:92vw;text-align:center}
.share-box h3{font-size:17px;font-weight:700;color:#1a0a3d;margin-bottom:6px}
.share-box p{font-size:13px;color:#666;margin-bottom:20px}
.share-options{display:flex;flex-direction:column;gap:10px}
.share-opt{padding:13px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;border:none;font-family:inherit;transition:all .2s}
.share-opt:hover{opacity:.85}
.sopt-html{background:linear-gradient(135deg,#1a0a3d,#2d1b69);color:#f0d080}
.sopt-txt{background:linear-gradient(135deg,#2d6a4f,#1b4332);color:#fff}
.sopt-close{background:#f0ebe0;color:#555;margin-top:4px}
/* toast */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a0a3d;color:#f0d080;padding:12px 24px;border-radius:30px;font-size:14px;opacity:0;transition:all .35s;z-index:10000;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* 인쇄(PDF) 전용 스타일 */
@media print{
  #pg-intro,#pg-loading{display:none!important}
  #pg-report{display:block!important}
  .report-toolbar{display:none!important}
  #share-modal,#toast{display:none!important}
  body{background:#fff!important}
  .cover{-webkit-print-color-adjust:exact;print-color-adjust:exact;border-radius:12px}
  .section{break-inside:avoid;box-shadow:none;border:1px solid #e0d8cc}
  .dark-card,.ast-card,.tl-body.active,.year-card.cur{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{margin:15mm 12mm;size:A4}
}
@media(max-width:600px){.date-row{grid-template-columns:1fr 1fr}.ptable{font-size:11px}.stem-txt{font-size:22px}.branch-txt{font-size:18px}.month-grid{grid-template-columns:repeat(2,1fr)}.rel-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="pg-intro">
  <div class="logo-diamond"><span>✦</span></div>
  <div class="intro-title">大萬神</div>
  <div class="intro-sub">만세력 · 점성술 종합 사주 연구원</div>
  <div class="form-box">
    <h2>✦ 사주팔자 종합 분석 ✦</h2>
    <div class="cal-toggle">
      <button class="cal-btn active" id="btn-solar">☀️ 양력 (서력)</button>
      <button class="cal-btn" id="btn-lunar">🌙 음력 (陰曆)</button>
    </div>
    <div class="fgroup">
      <label>이름</label>
      <input class="finput" id="f-name" type="text" placeholder="성함을 입력하세요">
    </div>
    <div class="fgroup">
      <label id="lbl-date">생년월일 (양력)</label>
      <div class="date-row">
        <input class="finput" id="f-year" type="number" placeholder="년도 (예: 1988)" min="1930" max="2010">
        <input class="finput" id="f-month" type="number" placeholder="월" min="1" max="12">
        <input class="finput" id="f-day" type="number" placeholder="일" min="1" max="30">
      </div>
    </div>
    <div class="leap-row" id="leap-row" style="display:none">
      <input type="checkbox" id="f-leap">
      <label for="f-leap">윤달 (閏月) — 이달이 윤달이면 체크</label>
    </div>
    <div class="fgroup">
      <label>태어난 시간</label>
      <select class="fselect" id="f-hour">
        <option value="-1">시간 모름</option>
        <option value="23">자시(子時) 23:00~01:00</option>
        <option value="1">축시(丑時) 01:00~03:00</option>
        <option value="3">인시(寅時) 03:00~05:00</option>
        <option value="5">묘시(卯時) 05:00~07:00</option>
        <option value="7">진시(辰時) 07:00~09:00</option>
        <option value="9">사시(巳時) 09:00~11:00</option>
        <option value="11">오시(午時) 11:00~13:00</option>
        <option value="13">미시(未時) 13:00~15:00</option>
        <option value="15">신시(申時) 15:00~17:00</option>
        <option value="17">유시(酉時) 17:00~19:00</option>
        <option value="19">술시(戌時) 19:00~21:00</option>
        <option value="21">해시(亥時) 21:00~23:00</option>
      </select>
    </div>
    <div class="fgroup">
      <label>성별</label>
      <div class="gender-row">
        <div class="gbtn" id="gbtn-M" >♂ 남성</div>
        <div class="gbtn" id="gbtn-F" >♀ 여성</div>
      </div>
    </div>
    <div class="fgroup" style="margin-top:10px">
      <label>출생 도시 (상승궁 계산용)</label>
      <select class="fselect" id="f-city">
        <option value="seoul">서울/경기/인천</option>
        <option value="busan">부산/울산</option>
        <option value="daegu">대구</option>
        <option value="gwangju">광주/전남</option>
        <option value="daejeon">대전/충청</option>
        <option value="jeju">제주</option>
        <option value="tokyo">일본 (도쿄)</option>

var selectedGender = null;
var calMode = 'solar'; // 'solar' or 'lunar'
var currentInput = null;

function selectGender(g) {
  selectedGender = g;
  document.getElementById('gbtn-M').className = 'gbtn' + (g==='M' ? ' selected' : '');
  document.getElementById('gbtn-F').className = 'gbtn' + (g==='F' ? ' selected' : '');
}
selectGender('F');

// ================================================
//  이벤트 리스너 (CSP 대응 — inline onclick 대신 addEventListener 사용)
// ================================================
function attachEventListeners() {
  // 양력/음력 토글
  var btnSolar = document.getElementById('btn-solar');
  var btnLunar = document.getElementById('btn-lunar');
  if(btnSolar) btnSolar.addEventListener('click', function(){ selectCal('solar'); });
  if(btnLunar) btnLunar.addEventListener('click', function(){ selectCal('lunar'); });

  // 성별 버튼
  var btnM = document.getElementById('gbtn-M');
  var btnF = document.getElementById('gbtn-F');
  if(btnM) btnM.addEventListener('click', function(){ selectGender('M'); });
  if(btnF) btnF.addEventListener('click', function(){ selectGender('F'); });

  // 분석 시작 버튼
  var submitBtn = document.getElementById('submit-btn-main');
  if(submitBtn) submitBtn.addEventListener('click', startReport);

  // 뒤로가기 버튼
  var backBtn = document.getElementById('back-btn-main');
  if(backBtn) backBtn.addEventListener('click', goBack);

  // PDF 저장 버튼
  var pdfBtn = document.getElementById('pdf-btn-main');
  if(pdfBtn) pdfBtn.addEventListener('click', savePDF);

  // 공유하기 버튼
  var shareBtn = document.getElementById('share-btn-main');
  if(shareBtn) shareBtn.addEventListener('click', openShareModal);

  // 요약 복사 버튼
  var copyBtn = document.getElementById('copy-btn-main');
  if(copyBtn) copyBtn.addEventListener('click', copySummary);

  // 모달 내부 버튼들
  var soptHtml = document.getElementById('sopt-html');
  var soptTxt  = document.getElementById('sopt-txt');
  var soptClose= document.getElementById('sopt-close');
  if(soptHtml)  soptHtml.addEventListener('click', downloadReportHTML);
  if(soptTxt)   soptTxt.addEventListener('click',  function(){ closeShareModal(); copySummary(); });
  if(soptClose) soptClose.addEventListener('click', closeShareModal);

  // 모달 외부 클릭 시 닫기
  var modal = document.getElementById('share-modal');
  if(modal) modal.addEventListener('click', function(e){ if(e.target === modal) closeShareModal(); });
}

if(document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', attachEventListeners);
} else {
  attachEventListeners();
}

function downloadReportHTML() {
  closeShareModal();
  if(!currentInput) { showToast('❌ 먼저 사주 분석을 실행해 주세요'); return; }
  var inp = currentInput;
  var reportDiv = document.getElementById('report-body');
  if(!reportDiv || !reportDiv.innerHTML.trim()) { showToast('❌ 리포트가 없습니다'); return; }

  var dateStr = inp.year + '년 ' + inp.month + '월 ' + inp.day + '일';
  var html = '<!DOCTYPE html>\n<html lang="ko">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1.0">\n<title>' + inp.name + ' 사주팔자 리포트 — 대만신</title>\n<style>\n';

  // 현재 페이지의 스타일 복사
  var styles = document.querySelectorAll('style');
  for(var i=0;i<styles.length;i++){ html += styles[i].innerHTML + '\n'; }

  html += '#pg-intro,#pg-loading,#share-modal,#toast,.report-toolbar{display:none!important}\n';
  html += '#pg-report{display:block!important}\n';
  html += 'body{background:#f8f6f0}\n';
  html += '</style>\n</head>\n<body>\n';
  html += '<div id="pg-report" style="display:block">\n';
  html += '<div style="max-width:920px;margin:0 auto;padding:20px 16px">\n';
  html += reportDiv.innerHTML;
  html += '\n<div style="text-align:center;padding:30px 0;color:#aaa;font-size:12px">✦ 대만신 사주 연구원 | 입춘 절기 기준 · 정밀 만세력 · 서양 점성술 융합 ✦</div>\n';
  html += '</div>\n</div>\n</body>\n</html>';

  var blob = new Blob([html], {type:'text/html;charset=utf-8'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href   = url;
  a.download = inp.name + '_사주리포트_대만신.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 3000);
  showToast('💾 ' + inp.name + ' 님의 리포트를 저장했습니다!');
}

  var inp = currentInput;
  var yp=getYearPillar(inp.year,inp.month,inp.day);
  var mp=getMonthPillar(inp.year,inp.month,inp.day);
  var dp=getDayPillar(inp.year,inp.month,inp.day);
  var hp=getHourPillar(dp.stem,inp.hour);

function lunarToSolar(ly, lm, ld, isLeap) {
  var data = LUNAR_DATA[String(ly)];
  if (!data) return null;
  var start = data.start;
  var months = data.months;
  var leapMonth = data.leap;
  var days = 0;
  var idx = 0;
  for (var m = 1; m < lm; m++) {
    days += months[idx++];
    if (leapMonth === m) { days += months[idx++]; }
  }
  if (isLeap && leapMonth === lm) { days += months[idx++]; }
  days += ld - 1;
  var d = new Date(start[0], start[1]-1, start[2]);
  d.setDate(d.getDate() + days);
  return [d.getFullYear(), d.getMonth()+1, d.getDate()];
}

// 절기 경계 [태양월, 절입일, 사주월인덱스(인=0)]
var JIEQI = [[2,4,0],[3,6,1],[4,5,2],[5,6,3],[6,6,4],[7,7,5],[8,7,6],[9,8,7],[10,8,8],[11,7,9],[12,7,10]];

// ================================================
//  사주 계산
// ================================================
function getSajuMonthIdx(month, day) {
  if (month === 1) return (day < 6) ? 10 : 11;
  var idx = 11;
  for (var i = 0; i < JIEQI.length; i++) {
    var jm = JIEQI[i][0], jd = JIEQI[i][1], ji = JIEQI[i][2];
    if (month > jm || (month === jm && day >= jd)) idx = ji;
  }
  return idx;
}

function getYearPillar(year, month, day) {
  var y = year;
  if (month < 2 || (month === 2 && day < 4)) y--;
  return { stem: STEMS[(y-4+400)%10], branch: BRANCHES[(y-4+480)%12] };
}

function getMonthPillar(year, month, day) {
  var y = year;
  if (month < 2 || (month === 2 && day < 4)) y--;
  var yi = (y-4+400)%10;
  var smi = getSajuMonthIdx(month, day);
  var startStem = ((yi%5)*2+2)%10;
  return { stem: STEMS[(startStem+smi)%10], branch: BRANCHES[(2+smi)%12] };
}

function getDayPillar(year, month, day) {
  var y = year, m = month;
  if (m <= 2) { y--; m += 12; }
  var A = Math.floor(y/100), B = 2-A+Math.floor(A/4);
  var JD = Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+day+B-1524;
  var off = JD - 2415021;
  return { stem: STEMS[((off%10)+10)%10], branch: BRANCHES[(off%12+10)%12] };
}

function getHourPillar(dayStem, hour) {
  if (hour < 0) return null;
  var hb = (hour === 23) ? 0 : Math.floor((hour+1)/2);
  var bi = hb%12;
  var di = STEMS.indexOf(dayStem);
  var starts = [0,2,4,6,8,0,2,4,6,8];
  return { stem: STEMS[(starts[di]+bi)%10], branch: BRANCHES[bi] };
}

function getTenStar(ds, os) {
  var di = STEMS.indexOf(ds), oi = STEMS.indexOf(os);
  var de = S_ELEM[di], oe = S_ELEM[oi];
  var same = (di%2) === (oi%2);
  if (de===oe) return same ? '비견' : '겁재';
  if (EL_GEN[de]===oe) return same ? '식신' : '상관';
  if (EL_CTR[de]===oe) return same ? '편재' : '정재';
  if (EL_GEN[oe]===de) return same ? '편인' : '정인';
  if (EL_CTR[oe]===de) return same ? '편관' : '정관';
  return '';
}

function getTwelveStage(ds, br) {
  var bi = BRANCHES.indexOf(br);
  return (T12[ds] || [])[bi] || '-';
}

function calcElements(pillars) {
  var c = { 목:0, 화:0, 토:0, 금:0, 수:0 };
  pillars.forEach(function(p) {
    if (!p) return;
    c[S_ELEM[STEMS.indexOf(p.stem)]] += 2;
    c[B_ELEM[BRANCHES.indexOf(p.branch)]] += 2;
    (HIDDEN[p.branch]||[]).forEach(function(h){ c[S_ELEM[STEMS.indexOf(h)]] += 1; });
  });
  return c;
}

function getStrength(de, pillars) {
  var sup=0, tot=0;
  pillars.forEach(function(p) {
    if (!p) return;
    var se=S_ELEM[STEMS.indexOf(p.stem)], be=B_ELEM[BRANCHES.indexOf(p.branch)];
    if (se===de || EL_GEN_R[de]===se) sup+=2;
    if (be===de || EL_GEN_R[de]===be) sup+=2;
    tot+=4;
  });
  return (sup*2>=tot) ? '신강(身强)' : '신약(身弱)';
}

// 공망
function getGongmang(stemIdx, branchIdx) {
  var diff = ((branchIdx-stemIdx)+12)%12;
  return [(diff+10)%12, (diff+11)%12];
}

// 도화/역마/화개 그룹 조회
function getSsalGroup(br) {
  var g1=['인','오','술'], g2=['신','자','진'], g3=['사','유','축'], g4=['해','묘','미'];
  if (g1.indexOf(br)>=0) return 'g1';
  if (g2.indexOf(br)>=0) return 'g2';
  if (g3.indexOf(br)>=0) return 'g3';
  if (g4.indexOf(br)>=0) return 'g4';
  return null;
}
var DOHWA_MAP = { g1:'묘', g2:'유', g3:'오', g4:'자' };
var YEOKMA_MAP = { g1:'신', g2:'인', g3:'해', g4:'사' };
var HWAGAE_MAP = { g1:'술', g2:'진', g3:'축', g4:'미' };
var YANGIN_MAP = { 갑:'묘', 을:'인', 병:'오', 정:'사', 무:'오', 기:'사', 경:'유', 신:'신', 임:'자', 계:'해' };

function calcSsal(pillars, ds) {
  var yearBr = pillars[0] ? pillars[0].branch : null;
  var dayBr  = pillars[2] ? pillars[2].branch : null;
  var monthBr= pillars[1] ? pillars[1].branch : null;
  var hourBr = pillars[3] ? pillars[3].branch : null;
  var allBr  = [yearBr, monthBr, dayBr, hourBr].filter(Boolean);

  // 도화살 (년지, 일지 기준)
  var dohwa_yr = yearBr ? DOHWA_MAP[getSsalGroup(yearBr)] : null;
  var dohwa_dy = dayBr  ? DOHWA_MAP[getSsalGroup(dayBr)]  : null;
  var dohwaWhere = [];
  allBr.forEach(function(b){ if(b===dohwa_yr||b===dohwa_dy) dohwaWhere.push(b); });

  // 역마살 (년지, 일지 기준)
  var yeokma_yr = yearBr ? YEOKMA_MAP[getSsalGroup(yearBr)] : null;
  var yeokma_dy = dayBr  ? YEOKMA_MAP[getSsalGroup(dayBr)]  : null;
  var yeokmaWhere = [];
  allBr.forEach(function(b){ if(b===yeokma_yr||b===yeokma_dy) yeokmaWhere.push(b); });

  // 화개살 (년지, 일지 기준)
  var hwagae_yr = yearBr ? HWAGAE_MAP[getSsalGroup(yearBr)] : null;
  var hwagae_dy = dayBr  ? HWAGAE_MAP[getSsalGroup(dayBr)]  : null;
  var hwagaeWhere = [];
  allBr.forEach(function(b){ if(b===hwagae_yr||b===hwagae_dy) hwagaeWhere.push(b); });

  // 양인살
  var yangin = YANGIN_MAP[ds];
  var yanginWhere = allBr.filter(function(b){ return b===yangin; });

  // 공망 (일주 기준)
  var gm = [], gmBr = [];
  if (pillars[2]) {
    var si = STEMS.indexOf(ds), bi = BRANCHES.indexOf(dayBr);
    var gm_idx = getGongmang(si, bi);
    gmBr = [BRANCHES[gm_idx[0]], BRANCHES[gm_idx[1]]];
    allBr.forEach(function(b){ if(gmBr.indexOf(b)>=0) gm.push(b); });
  }

  // 화(火)살: 사오미 과다 (화 오행 4개 이상)
  var fireCount = allBr.filter(function(b){ return ['사','오','미'].indexOf(b)>=0; }).length;

  return {
    dohwa:{ val: dohwa_yr||dohwa_dy, where: dohwaWhere },
    yeokma:{ val: yeokma_yr||yeokma_dy, where: yeokmaWhere },
    hwagae:{ val: hwagae_yr||hwagae_dy, where: hwagaeWhere },
    yangin:{ val: yangin, where: yanginWhere },
    gongmang:{ val: gmBr, where: gm },
    fire: fireCount >= 3
  };
}

// 천간합
var STEM_HAP = [['갑','기'],['을','경'],['병','신'],['정','임'],['무','계']];
var STEM_HAP_RESULT = { '갑기':'토', '을경':'금', '병신':'수', '정임':'목', '무계':'화' };
// 천간충
var STEM_CHUNG = [['갑','경'],['을','신'],['병','임'],['정','계']];
// 지지육합
var BRANCH_YUKH = [['자','축'],['인','해'],['묘','술'],['진','유'],['사','신'],['오','미']];
var BRANCH_YUKH_RESULT = { '자축':'토', '인해':'목', '묘술':'화', '진유':'금', '사신':'수', '오미':'화' };
// 지지삼합
var BRANCH_SAM = [['인','오','술','화'],['신','자','진','수'],['사','유','축','금'],['해','묘','미','목']];
// 지지방합
var BRANCH_BANG = [['인','묘','진','목'],['사','오','미','화'],['신','유','술','금'],['해','자','축','수']];
// 지지충
var BRANCH_CHUNG = [['자','오'],['축','미'],['인','신'],['묘','유'],['진','술'],['사','해']];
// 지지형
var BRANCH_HYUNG = [['인','사','신'],['축','술','미'],['자','묘']];
// 지지파
var BRANCH_PA = [['자','유'],['오','묘'],['인','해'],['사','신'],['축','진'],['술','미']];
// 지지해
var BRANCH_HAE = [['자','미'],['축','오'],['인','사'],['묘','진'],['신','해'],['유','술']];

function analyzeRelations(pillars) {
  var stems   = pillars.map(function(p){ return p?p.stem:null; });
  var branches= pillars.map(function(p){ return p?p.branch:null; });
  var res = { stemHap:[], stemChung:[], yukHap:[], samHap:[], bangHap:[], branchChung:[], hyung:[], pa:[], hae:[] };

  // 천간합
  for (var i=0;i<stems.length;i++) for(var j=i+1;j<stems.length;j++) {
    if (!stems[i]||!stems[j]) continue;
    STEM_HAP.forEach(function(pair){
      if((stems[i]===pair[0]&&stems[j]===pair[1])||(stems[i]===pair[1]&&stems[j]===pair[0])){
        var k=[pair[0],pair[1]].sort().join('');
        res.stemHap.push({a:stems[i],b:stems[j],result:STEM_HAP_RESULT[pair.join('')||pair.reverse().join('')]||''});
      }
    });
    STEM_CHUNG.forEach(function(pair){
      if((stems[i]===pair[0]&&stems[j]===pair[1])||(stems[i]===pair[1]&&stems[j]===pair[0]))
        res.stemChung.push({a:stems[i],b:stems[j]});
    });
  }

  // 지지 관계
  for(var i=0;i<branches.length;i++) for(var j=i+1;j<branches.length;j++) {
    if(!branches[i]||!branches[j]) continue;
    var ba=branches[i], bb=branches[j];
    BRANCH_YUKH.forEach(function(pair){
      if((ba===pair[0]&&bb===pair[1])||(ba===pair[1]&&bb===pair[0])){
        var k=pair[0]+pair[1]; res.yukHap.push({a:ba,b:bb,result:BRANCH_YUKH_RESULT[k]||''});
      }
    });
    BRANCH_CHUNG.forEach(function(pair){
      if((ba===pair[0]&&bb===pair[1])||(ba===pair[1]&&bb===pair[0]))
        res.branchChung.push({a:ba,b:bb});
    });
    BRANCH_PA.forEach(function(pair){
      if((ba===pair[0]&&bb===pair[1])||(ba===pair[1]&&bb===pair[0]))
        res.pa.push({a:ba,b:bb});
    });
    BRANCH_HAE.forEach(function(pair){
      if((ba===pair[0]&&bb===pair[1])||(ba===pair[1]&&bb===pair[0]))
        res.hae.push({a:ba,b:bb});
    });
  }

  // 삼합 (3개 조합)
  BRANCH_SAM.forEach(function(trio){
    var found=trio.slice(0,3).filter(function(b){ return branches.indexOf(b)>=0; });
    if(found.length>=2) res.samHap.push({members:found,full:found.length===3,result:trio[3]});
  });

  // 방합 (3개 조합)
  BRANCH_BANG.forEach(function(trio){
    var found=trio.slice(0,3).filter(function(b){ return branches.indexOf(b)>=0; });
    if(found.length>=2) res.bangHap.push({members:found,full:found.length===3,result:trio[3]});
  });

  // 형
  BRANCH_HYUNG.forEach(function(group){
    var found=group.filter(function(b){ return branches.indexOf(b)>=0; });
    if(found.length>=2) res.hyung.push({members:found});
  });

  return res;

function getDaeunStartAge(y,m,d,gender,yearStem) {
  var yangYear=STEMS.indexOf(yearStem)%2===0;
  var fwd=(yangYear&&gender==='M')||(!yangYear&&gender==='F');
  var jieqiDays=[6,4,6,5,6,6,7,7,8,8,7,7];
  var daysInMonth=[31,28,31,30,31,30,31,31,30,31,30,31];
  var curJd=jieqiDays[m-1];
  var days;
  if(fwd) {
    days=(d<curJd)?(curJd-d):(daysInMonth[m-1]-d+jieqiDays[m%12]);
  } else {
    days=(d>=curJd)?(d-curJd):(daysInMonth[(m-2+12)%12]-jieqiDays[(m-2+12)%12]+d);
  }
  return { age:Math.max(1,Math.round(days/3)), fwd:fwd };
}

function calcDaeun(yp,mp,gender,y,m,d) {
  var da=getDaeunStartAge(y,m,d,gender,yp.stem);
  var msi=STEMS.indexOf(mp.stem), mbi=BRANCHES.indexOf(mp.branch);
  var list=[];
  for(var i=0;i<9;i++) {
    var si=da.fwd?(msi+i+1)%10:((msi-i-1+100)%10);
    var bi=da.fwd?(mbi+i+1)%12:((mbi-i-1+120)%12);
    list.push({age:da.age+i*10, end:da.age+(i+1)*10-1, stem:STEMS[si], branch:BRANCHES[bi]});
  }
  return {list:list, startAge:da.age, fwd:da.fwd};
}

function getYearFortune(y) {
  return {stem:STEMS[(y-4+400)%10], branch:BRANCHES[(y-4+480)%12]};
}

function getMonthFortune(monthPillar, n) {
  var msi=STEMS.indexOf(monthPillar.stem), mbi=BRANCHES.indexOf(monthPillar.branch);
  return {stem:STEMS[(msi+n)%10], branch:BRANCHES[(mbi+n)%12]};
}

function getRisingSign(sunSign,hour,city) {
  if(hour<0) return null;
  var cityOffset={seoul:0,busan:14,daegu:5,gwangju:-9,daejeon:-4,jeju:-15,tokyo:30,beijing:-52,shanghai:-28,newyork:-825,la:-1095,london:-540,sydney:360,other:0};

  var localHour=(hour+offset/60+24)%24;
  var sunIdx=ZODIAC_DATA.indexOf(sunSign);
  var hourDiff=localHour-12;
  var signShift=Math.round(hourDiff/2);

}

async function startReport() {
  var name  = document.getElementById('f-name').value.trim();
  var yearIn= parseInt(document.getElementById('f-year').value)  || 0;
  var monthIn=parseInt(document.getElementById('f-month').value) || 0;
  var dayIn = parseInt(document.getElementById('f-day').value)   || 0;
  var hour  = parseInt(document.getElementById('f-hour').value);
  var city  = document.getElementById('f-city').value;
  var isLeap= document.getElementById('f-leap').checked;

  if (!name) { alert('이름을 입력해 주세요.'); return; }
  if (yearIn<1930||yearIn>2010) { alert('생년은 1930~2010 사이로 입력해 주세요.'); return; }
  if (monthIn<1||monthIn>12)   { alert('월은 1~12 사이로 입력해 주세요.'); return; }
  if (dayIn<1||dayIn>30)       { alert('일은 1~30 사이로 입력해 주세요.'); return; }
  if (!selectedGender)         { alert('성별을 선택해 주세요.'); return; }

  var year=yearIn, month=monthIn, day=dayIn;
  var isLunarInput = (calMode === 'lunar');
  var lunarYMD = null;

  if (isLunarInput) {
    // 음력→양력 변환
    var solar = lunarToSolar(yearIn, monthIn, dayIn, isLeap);
    if (!solar) { alert('해당 음력 날짜를 변환할 수 없습니다. 날짜를 확인해 주세요.'); return; }
    lunarYMD = [yearIn, monthIn, dayIn, isLeap];
    year=solar[0]; month=solar[1]; day=solar[2];
  }

  currentInput={name,gender:selectedGender,year,month,day,hour,city,isLunarInput,lunarYMD,origYear:yearIn,origMonth:monthIn,origDay:dayIn};

  document.getElementById('pg-intro').style.display='none';
  document.getElementById('pg-report').style.display='none';
  var lp=document.getElementById('pg-loading');
  lp.style.display='flex';
  for(var i=1;i<=7;i++) document.getElementById('step'+i).className='step-item';

  await delay(400); markStep(1);
  await delay(500); markStep(2);
  await delay(500); markStep(3);
  await delay(500); markStep(4);
  await delay(500); markStep(5);
  await delay(400); markStep(6);
  await delay(400); markStep(7);
  await delay(300);

  lp.style.display='none';
  buildReport(name,selectedGender,year,month,day,hour,city,lunarYMD);
  document.getElementById('pg-report').style.display='block';
  window.scrollTo(0,0);
}

function buildReport(name,gdr,year,month,day,hour,city,lunarYMD) {
  // --- 사주 계산 ---
  var yp=getYearPillar(year,month,day);
  var mp=getMonthPillar(year,month,day);
  var dp=getDayPillar(year,month,day);
  var hp=getHourPillar(dp.stem,hour);

  var ds=dp.stem, db=dp.branch;
  var de=S_ELEM[STEMS.indexOf(ds)];
  var dmi=DM_DATA[ds];

  var allPillars=[yp,mp,dp,hp];
  var pillars=allPillars.filter(Boolean);
  var els=calcElements(pillars);
  var str=getStrength(de,pillars);
  var daeun=calcDaeun(yp,mp,gdr,year,month,day);
  var curAge=2026-year;
  var curDu=daeun.list.find(function(u){return curAge>=u.age&&curAge<=u.end;})||daeun.list[0];

  var elArr=['목','화','토','금','수'];
  var elSorted=[...elArr].sort(function(a,b){return els[b]-els[a];});
  var domEl=elSorted[0], wkEl=elSorted[4];

  var yongshin;
  if(str==='신강(身强)') {
    // 신강: 관성·재성이 용신
    yongshin={elem:EL_CTR[de],type:'관성(官星)'};
  } else {

    yongshin={elem:EL_GEN_R[de],type:'인성(印星)'};
  }

  var stars={
    yr:getTenStar(ds,yp.stem),
    mo:getTenStar(ds,mp.stem),
    hr:hp?getTenStar(ds,hp.stem):null
  };
  var st12={
    yr:getTwelveStage(ds,yp.branch),
    mo:getTwelveStage(ds,mp.branch),
    dy:getTwelveStage(ds,db),
    hr:hp?getTwelveStage(ds,hp.branch):null
  };

  // 신살
  var ssal=calcSsal(allPillars,ds);
  // 공망
  var gmIdx=getGongmang(STEMS.indexOf(ds),BRANCHES.indexOf(db));
  var gmBranches=[BRANCHES[gmIdx[0]],BRANCHES[gmIdx[1]]];

    });
  });

  // 연운 2024~2035
  var yfs=[];

    yfs.push({yr,stem:yf.stem,branch:yf.branch,star:getTenStar(ds,yf.stem),stage:getTwelveStage(ds,yf.branch)});
  }

  // 월운 (현재 년)
  var mfs=[];
  for(var mn=1;mn<=12;mn++){

  var gdrT=(gdr==='M')?'남성':'여성';
